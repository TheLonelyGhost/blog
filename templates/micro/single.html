{% extends "base.html" %}

{% block breadcrumbs %}
<nav class="breadcrumb" aria-label="breadcrumbs">
	<ol>
		<li><a href="{{get_url(path="./micro") }}">Stream</a></li>
	</ol>
</nav>
{% endblock breadcrumbs %}

{% block content %}
<article class="box">
	<section class="media">
		<div class="media-left">
			<figure class="profile image is-48x48">
				<img class="is-rounded" src="{{config.extra.avatar}}" alt="David Alexander smiling in photo" />
			</figure>
		</div>
		<div class="media-content">
			<p class="title is-4">David Alexander</p>
			<p class="subtitle is-6">@thelonelyghost</p>
		</div>
	</section>
	<div class="content">
		{{ page.content | safe }}
		<p><small><a href="{{page.permalink | safe}}" aria-current="page">{{macros::date(page_date=page.date)}}</a></small></p>
	</div>
</article>
{% endblock content %}
