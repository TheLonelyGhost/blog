{% extends "base.html" %}

{% block bodyclasses %}project index{% endblock bodyclasses %}

{% block content %}
<section class="content">
	<h1 class="title">{{ section.title | default(value="Projects") | title }}</h1>

	<ul>

		{% endfor %}
	</ul>
</section>
{% endblock content %}
